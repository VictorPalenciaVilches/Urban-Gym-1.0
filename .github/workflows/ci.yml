# ============================================================================
# Urban GYM – Continuous Integration (CI)
# ============================================================================
# Ejecuta pruebas unitarias, genera reportes de cobertura y valida el build
# de todos los microservicios en cada push y pull request.
# ============================================================================

name: "🧪 CI – Tests & Coverage"

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

# Cancela ejecuciones anteriores si hay un nuevo push al mismo branch
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

# ────────────────────────────────────────────────────────────────────────────
# Jobs
# ────────────────────────────────────────────────────────────────────────────
jobs:

  # ── 1. Pruebas unitarias de los 8 microservicios (en paralelo) ──────────
  test-backend:
    name: "🔬 Test · ${{ matrix.service }}"
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false          # Si uno falla, los demás siguen para ver todo el panorama
      matrix:
        service:
          - api-gateway
          - member-service
          - booking-service
          - billing-service
          - facility-service
          - iot-service
          - recommendation-service
          - workout-progress-service

    defaults:
      run:
        working-directory: ${{ matrix.service }}

    steps:
      - name: 📥 Checkout del código
        uses: actions/checkout@v4

      - name: 🟢 Configurar Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "npm"
          cache-dependency-path: ${{ matrix.service }}/package-lock.json

      - name: 📦 Instalar dependencias
        run: npm ci

      - name: 🧪 Ejecutar pruebas con cobertura
        run: npm run test:cov
        env:
          # Variables de entorno ficticias para evitar errores en los tests
          SUPABASE_URL: "https://test.supabase.co"
          SUPABASE_KEY: "test-key"
          SUPABASE_SERVICE_KEY: "test-service-key"
          JWT_SECRET: "test-jwt-secret"
          INTERNAL_SECRET: "test-internal-secret"

      - name: 📊 Subir reporte de cobertura
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-${{ matrix.service }}
          path: ${{ matrix.service }}/coverage/
          retention-days: 14

  # ── 2. Build y verificación del Frontend ────────────────────────────────
  test-frontend:
    name: "🎨 Build · Frontend"
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend

    steps:
      - name: 📥 Checkout del código
        uses: actions/checkout@v4

      - name: 🟢 Configurar Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: 📦 Instalar dependencias
        run: npm ci

      - name: 🔍 Verificación de tipos (TypeScript)
        run: npx tsc --noEmit

      - name: 🏗️ Build de producción
        run: npm run build
        env:
          VITE_API_URL: "https://api.urbangym.example.com"

      - name: 📊 Subir artefactos del build
        uses: actions/upload-artifact@v4
        with:
          name: frontend-build
          path: frontend/dist/
          retention-days: 14

  # ── 3. Build de verificación de todos los backends ──────────────────────
  build-backend:
    name: "🏗️ Build · ${{ matrix.service }}"
    runs-on: ubuntu-latest
    needs: test-backend
    strategy:
      fail-fast: false
      matrix:
        service:
          - api-gateway
          - member-service
          - booking-service
          - billing-service
          - facility-service
          - iot-service
          - recommendation-service
          - workout-progress-service

    defaults:
      run:
        working-directory: ${{ matrix.service }}

    steps:
      - name: 📥 Checkout del código
        uses: actions/checkout@v4

      - name: 🟢 Configurar Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "npm"
          cache-dependency-path: ${{ matrix.service }}/package-lock.json

      - name: 📦 Instalar dependencias
        run: npm ci

      - name: 🏗️ Compilar proyecto (nest build)
        run: npm run build

      - name: 📊 Subir artefacto de build
        uses: actions/upload-artifact@v4
        with:
          name: build-${{ matrix.service }}
          path: ${{ matrix.service }}/dist/
          retention-days: 7

  # ── 4. Resumen final del CI ─────────────────────────────────────────────
  ci-summary:
    name: "✅ CI Summary"
    runs-on: ubuntu-latest
    needs: [test-backend, test-frontend, build-backend]
    if: always()

    steps:
      - name: 📋 Resumen de resultados
        run: |
          echo "╔══════════════════════════════════════════════════╗"
          echo "║          Urban GYM – CI Pipeline Summary        ║"
          echo "╠══════════════════════════════════════════════════╣"
          echo "║ Backend Tests:  ${{ needs.test-backend.result }}  ║"
          echo "║ Frontend Build: ${{ needs.test-frontend.result }}  ║"
          echo "║ Backend Build:  ${{ needs.build-backend.result }}  ║"
          echo "╚══════════════════════════════════════════════════╝"

      - name: ❌ Fallar si algún paso falló
        if: >-
          needs.test-backend.result == 'failure' ||
          needs.test-frontend.result == 'failure' ||
          needs.build-backend.result == 'failure'
        run: exit 1
