global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: 'api-gateway'
    static_configs:
      - targets: ['api-gateway:3000']
    metrics_path: '/metrics'

  - job_name: 'member-service'
    static_configs:
      - targets: ['member-service:3001']
    metrics_path: '/metrics'

  - job_name: 'booking-service'
    static_configs:
      - targets: ['booking-service:3002']
    metrics_path: '/metrics'

  - job_name: 'facility-service'
    static_configs:
      - targets: ['facility-service:3003']
    metrics_path: '/metrics'

  - job_name: 'iot-service'
    static_configs:
      - targets: ['iot-service:3004']
    metrics_path: '/metrics'

  - job_name: 'workout-progress-service'
    static_configs:
      - targets: ['workout-progress-service:3005']
    metrics_path: '/metrics'

  - job_name: 'billing-service'
    static_configs:
      - targets: ['billing-service:3006']
    metrics_path: '/metrics'

  - job_name: 'recommendation-service'
    static_configs:
      - targets: ['recommendation-service:3007']
    metrics_path: '/metrics'

  - job_name: 'admin-bff'
    static_configs:
      - targets: ['admin-bff:3008']
    metrics_path: '/metrics'
