# ============================================================================
# Urban GYM – Docker Compose (Orquestación del sistema completo)
# ============================================================================
# Uso:  docker compose up -d
# Logs: docker compose logs -f [servicio]
# Stop: docker compose down
# ============================================================================

services:

  # ── Redis (Broker de mensajes para eventos asíncronos) ───────────────────
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    networks:
      - urbangym-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3

  # ── Member Service ───────────────────────────────────────────────────────
  member-service:
    build:
      context: ./member-service
      args:
        PORT: 3001
    ports:
      - "3001:3001"
    env_file:
      - ./member-service/.env
    environment:
      - PORT=3001
    networks:
      - urbangym-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3001/metrics"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # ── Booking Service ──────────────────────────────────────────────────────
  booking-service:
    build:
      context: ./booking-service
      args:
        PORT: 3002
    ports:
      - "3002:3002"
    env_file:
      - ./booking-service/.env
    environment:
      - PORT=3002
      - PROGRESS_SERVICE_URL=http://workout-progress-service:3005
      - REDIS_URL=redis://redis:6379
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - urbangym-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3002/metrics"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # ── Facility Service ─────────────────────────────────────────────────────
  facility-service:
    build:
      context: ./facility-service
      args:
        PORT: 3003
    ports:
      - "3003:3003"
    env_file:
      - ./facility-service/.env
    environment:
      - PORT=3003
    networks:
      - urbangym-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3003/metrics"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # ── IoT Service ──────────────────────────────────────────────────────────
  iot-service:
    build:
      context: ./iot-service
      args:
        PORT: 3004
    ports:
      - "3004:3004"
    env_file:
      - ./iot-service/.env
    environment:
      - PORT=3004
      - PROGRESS_SERVICE_URL=http://workout-progress-service:3005
      - REDIS_URL=redis://redis:6379
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - urbangym-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3004/metrics"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # ── Workout Progress Service ─────────────────────────────────────────────
  workout-progress-service:
    build:
      context: ./workout-progress-service
      args:
        PORT: 3005
    ports:
      - "3005:3005"
    env_file:
      - ./workout-progress-service/.env
    environment:
      - PORT=3005
    networks:
      - urbangym-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3005/metrics"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # ── Billing Service ──────────────────────────────────────────────────────
  billing-service:
    build:
      context: ./billing-service
      args:
        PORT: 3006
    ports:
      - "3006:3006"
    env_file:
      - ./billing-service/.env
    environment:
      - PORT=3006
      - MEMBER_SERVICE_URL=http://member-service:3001
      - REDIS_URL=redis://redis:6379
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - urbangym-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3006/metrics"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # ── Recommendation Service ───────────────────────────────────────────────
  recommendation-service:
    build:
      context: ./recommendation-service
      args:
        PORT: 3007
    ports:
      - "3007:3007"
    env_file:
      - ./recommendation-service/.env
    environment:
      - PORT=3007
      - BOOKING_SERVICE_URL=http://booking-service:3002
      - PROGRESS_SERVICE_URL=http://workout-progress-service:3005
    networks:
      - urbangym-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3007/metrics"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # ── Admin BFF ────────────────────────────────────────────────────────────
  admin-bff:
    build:
      context: ./admin-bff
      args:
        PORT: 3008
    ports:
      - "3008:3008"
    env_file:
      - ./admin-bff/.env
    environment:
      - PORT=3008
      - MEMBER_SERVICE_URL=http://member-service:3001
      - BOOKING_SERVICE_URL=http://booking-service:3002
      - FACILITY_SERVICE_URL=http://facility-service:3003
      - BILLING_SERVICE_URL=http://billing-service:3006
    networks:
      - urbangym-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3008/metrics"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # ── API Gateway ──────────────────────────────────────────────────────────
  api-gateway:
    build:
      context: ./api-gateway
      args:
        PORT: 3000
    ports:
      - "3000:3000"
    environment:
      - PORT=3000
      - MEMBER_SERVICE_URL=http://member-service:3001
      - BOOKING_SERVICE_URL=http://booking-service:3002
      - FACILITY_SERVICE_URL=http://facility-service:3003
      - IOT_SERVICE_URL=http://iot-service:3004
      - PROGRESS_SERVICE_URL=http://workout-progress-service:3005
      - BILLING_SERVICE_URL=http://billing-service:3006
      - RECOMMENDATION_SERVICE_URL=http://recommendation-service:3007
      - ADMIN_BFF_URL=http://admin-bff:3008
    depends_on:
      member-service:
        condition: service_healthy
      booking-service:
        condition: service_healthy
      facility-service:
        condition: service_healthy
      iot-service:
        condition: service_healthy
      workout-progress-service:
        condition: service_healthy
      billing-service:
        condition: service_healthy
      recommendation-service:
        condition: service_healthy
      admin-bff:
        condition: service_healthy
    networks:
      - urbangym-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3000/metrics"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # ── Frontend ─────────────────────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      args:
        VITE_API_URL: http://localhost:3000
    ports:
      - "5173:80"
    depends_on:
      api-gateway:
        condition: service_healthy
    networks:
      - urbangym-network
    restart: unless-stopped

  # ── Prometheus (métricas) ────────────────────────────────────────────────
  prometheus:
    image: prom/prometheus:latest
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.retention.time=15d'
    networks:
      - urbangym-network
    restart: unless-stopped

  # ── Grafana (dashboards) ─────────────────────────────────────────────────
  grafana:
    image: grafana/grafana:latest
    ports:
      - "3010:3000"
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=urbangym2024
      - GF_USERS_ALLOW_SIGN_UP=false
      - GF_PATHS_PROVISIONING=/etc/grafana/provisioning
    volumes:
      - grafana-data:/var/lib/grafana
      - ./grafana/provisioning/datasources:/etc/grafana/provisioning/datasources:ro
      - ./grafana/provisioning/dashboards:/etc/grafana/provisioning/dashboards:ro
    depends_on:
      - prometheus
    networks:
      - urbangym-network
    restart: unless-stopped

# ── Red interna ────────────────────────────────────────────────────────────
networks:
  urbangym-network:
    driver: bridge

# ── Volúmenes persistentes ──────────────────────────────────────────────────
volumes:
  grafana-data:
